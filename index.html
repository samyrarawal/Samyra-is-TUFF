<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="page">

    <!-- Top book lining -->
    <div class="book-row top-books">
      <img src="blank-book.png" alt="Blank book">
      <img src="blank-book.png" alt="Blank book">
      <img src="blank-book.png" alt="Blank book">
      <img src="blank-book.png" alt="Blank book">
      <img src="blank-book.png" alt="Blank book">
      <img src="blank-book.png" alt="Blank book">
      <img src="blank-book.png" alt="Blank book">
    </div>

    <div class="middle">

      <!-- Left book lining -->
      <div class="book-column">
        <img src="blank-book.png" alt="Blank book">
        <img src="blank-book.png" alt="Blank book">
        <img src="blank-book.png" alt="Blank book">
        <img src="blank-book.png" alt="Blank book">
      </div>

      <!-- Main portfolio content -->
      <main class="content">

        <section class="intro">
          <img class="profile-pic" src="my-photo.jpg" alt="A picture of me">

          <div>
            <h1>Samyra</h1>
            <p class="subtitle">Student • Creator • Future Developer</p>
          </div>
        </section>

        <section class="project">
          <h2>My Project</h2>
          <p>
            Write your project description here. Talk about what you made,
            why you made it, what tools you used, and what you learned.
          </p>
        </section>

        <section class="gallery">
          <h2>Gallery</h2>
          <div class="images">
            <img src="the-hunger-games.webp" alt="The Hunger Games cover">
            <img src="the-inheritance-games.jpg" alt="The Inheritance Games cover">
          </div>
        </section>

      </main>

      <!-- Right book lining -->
      <div class="book-column">
        <img src="blank-book.png" alt="Blank book">
        <img src="blank-book.png" alt="Blank book">
        <img src="blank-book.png" alt="Blank book">
        <img src="blank-book.png" alt="Blank book">
      </div>

    </div>

    <!-- Bottom book lining -->
    <div class="book-row bottom-books">
      <img src="blank-book.png" alt="Blank book">
      <img src="blank-book.png" alt="Blank book">
      <img src="blank-book.png" alt="Blank book">
      <img src="blank-book.png" alt="Blank book">
      <img src="blank-book.png" alt="Blank book">
      <img src="blank-book.png" alt="Blank book">
      <img src="blank-book.png" alt="Blank book">
    </div>

  </div>

</body>
</html>
